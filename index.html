<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MonBillet.bf</title>
<style>
:root {
  --bg: #f0f0ec;
  --surface: #ffffff;
  --surface2: #f8f8f5;
  --border: rgba(0,0,0,0.09);
  --border2: rgba(0,0,0,0.15);
  --text: #1a1a1a;
  --text2: #555;
  --text3: #999;
  --green: #1D9E75;
  --green-dark: #0F6E56;
  --green-light: #E1F5EE;
  --green-text: #085041;
  --amber: #F5A623;
  --amber-light: #FAEEDA;
  --amber-text: #854F0B;
  --dark: #1a3a2a;
  --red: #E24B4A;
  --red-light: #FCEBEB;
  --blue-light: #E6F1FB;
  --blue-text: #185FA5;
  --radius: 14px;
  --radius-lg: 20px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg: #0f0f0f;
  --surface: #1c1c1e;
  --surface2: #2c2c2e;
  --border: rgba(255,255,255,0.1);
  --border2: rgba(255,255,255,0.18);
  --text: #f0f0f0;
  --text2: #aaa;
  --text3: #666;
  --green-light: #0a2e22;
  --green-text: #5DCAA5;
  --amber-light: #2e1e00;
  --amber-text: #F5A623;
  --red-light: #2e0a0a;
  --blue-light: #0a1e2e;
  --blue-text: #85B7EB;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);overflow:hidden;color:var(--text)}

/* ── LAYOUT ── */
.desktop-wrap{display:flex;height:100vh;align-items:flex-start;justify-content:center;gap:28px;padding:24px;background:var(--bg);overflow-y:auto}
.phone-frame{width:360px;flex-shrink:0;background:#111;border-radius:48px;padding:12px;box-shadow:0 0 0 1px #2a2a2a,0 32px 80px rgba(0,0,0,0.35)}
.phone-inner{background:var(--bg);border-radius:38px;overflow:hidden;height:720px;display:flex;flex-direction:column;position:relative}
.statusbar{background:var(--surface);padding:12px 22px 6px;display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;color:var(--text);flex-shrink:0;letter-spacing:0.2px}
.sidebar{width:270px;flex-shrink:0}

.mobile-wrap{display:none;height:100%;flex-direction:column}
.mobile-wrap .phone-inner{flex:1;border-radius:0;height:100%}

@media(max-width:600px){
  .desktop-wrap{display:none}
  .mobile-wrap{display:flex}
}

/* ── SCREEN TRANSITIONS ── */
.screen{display:none;flex-direction:column;height:100%;background:var(--bg);position:absolute;top:0;left:0;width:100%;opacity:0;transform:translateX(30px);transition:opacity .28s ease,transform .28s ease}
.screen.active{display:flex;opacity:1;transform:translateX(0);position:relative}
.screen.slide-back{transform:translateX(-20px)}

/* ── SPLASH ── */
#s-splash{background:var(--dark);align-items:center;justify-content:center;gap:0}
.splash-logo{font-size:36px;font-weight:800;color:white;letter-spacing:-1px;opacity:0;transform:translateY(20px);animation:fadeUp .6s .3s ease forwards}
.splash-logo span{color:var(--amber)}
.splash-tagline{font-size:14px;color:rgba(255,255,255,0.5);margin-top:6px;opacity:0;animation:fadeUp .5s .7s ease forwards}
.splash-loader{width:40px;height:3px;background:rgba(255,255,255,0.15);border-radius:20px;margin-top:40px;overflow:hidden;opacity:0;animation:fadeUp .4s .9s ease forwards}
.splash-bar{height:100%;background:var(--amber);border-radius:20px;animation:loadBar 1.4s 1s ease forwards}
@keyframes loadBar{from{width:0}to{width:100%}}
@keyframes fadeUp{to{opacity:1;transform:none}}

/* ── HEADERS ── */
.app-header{background:var(--surface);padding:13px 16px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.logo{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.logo .mon{color:var(--dark)}.logo .billet{color:var(--amber)}.logo .bf{color:var(--dark)}
[data-theme="dark"] .logo .mon,[data-theme="dark"] .logo .bf{color:#fff}
.nav-bar{background:var(--surface);padding:11px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-back{font-size:12px;color:var(--green);cursor:pointer;padding:6px 13px;border:0.5px solid var(--green);border-radius:20px;background:transparent;font-weight:600}
.nav-title{font-size:16px;font-weight:700;color:var(--text);flex:1;text-align:center}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* ── BOTTOM NAV ── */
.bottom-nav{background:var(--surface);border-top:0.5px solid var(--border);padding:8px 0 max(12px,env(safe-area-inset-bottom));display:flex;justify-content:space-around;flex-shrink:0}
.bnav{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--text3);cursor:pointer;padding:2px 10px;user-select:none;transition:color .2s}
.bnav.active{color:var(--green)}
.bnav-icon{font-size:22px;line-height:1}

/* ── BUTTONS ── */
.btn{border:none;border-radius:var(--radius);padding:15px;font-size:14px;font-weight:700;width:100%;cursor:pointer;margin-top:10px;transition:opacity .15s,transform .1s;font-family:inherit}
.btn:active{transform:scale(0.98);opacity:.9}
.btn-amber{background:var(--amber);color:#1a1a1a}
.btn-green{background:var(--green);color:white}
.btn-outline{background:var(--surface);color:var(--green);border:0.5px solid var(--green);padding:12px;font-size:13px;font-weight:600;text-align:center;border-radius:var(--radius);cursor:pointer;display:block;width:100%;margin-top:8px;font-family:inherit}
.btn-sm{flex:1;padding:11px;font-size:12px;border:0.5px solid var(--border2);border-radius:12px;background:var(--surface);color:var(--green);cursor:pointer;text-align:center;font-weight:600;font-family:inherit}

/* ── CARDS ── */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;transition:border-color .2s,transform .15s}
.card:active{transform:scale(0.99)}
.card.featured{border:2px solid var(--green)}
.card.tappable{cursor:pointer}

/* ── HERO ── */
.hero{background:var(--dark);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px}
.hero-loc{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.hero-title{font-size:22px;font-weight:800;color:white;line-height:1.15;margin-bottom:4px}
.hero-accent{color:var(--amber)}
.hero-sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:16px}
.hero-stats{display:flex;gap:24px}
.hs-n{font-size:18px;font-weight:800;color:white}
.hs-l{font-size:10px;color:rgba(255,255,255,.4)}

/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:16px}
.tab{flex:1;padding:9px 4px;font-size:11px;text-align:center;border-radius:12px;cursor:pointer;border:0.5px solid var(--border);background:var(--surface);color:var(--text2);font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab.active{background:var(--green);color:white;border-color:var(--green)}

/* ── FORM ── */
.form-group{margin-bottom:12px}
.form-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;display:block;font-weight:700}
.form-field{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:13px 14px;font-size:14px;color:var(--text);display:flex;align-items:center;gap:9px;cursor:pointer;width:100%;transition:border-color .2s,background .2s}
.form-field:hover,.form-field.focus{border-color:var(--green)}
.form-field .ph{color:var(--text3);font-size:13px}
.form-field .val{color:var(--text);font-weight:500}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}
.swap{width:38px;height:38px;background:var(--surface);border:0.5px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;align-self:center;margin-top:16px;font-size:17px;color:var(--green);flex-shrink:0;transition:background .2s,transform .3s}
.swap:active{transform:rotate(180deg)}

/* ── CITY PICKER MODAL ── */
.modal-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:0;width:100%;max-height:80%;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s ease}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-header{padding:16px 18px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:16px;font-weight:700;color:var(--text)}
.modal-close{font-size:20px;cursor:pointer;color:var(--text3);padding:2px 6px}
.modal-search{padding:10px 16px;flex-shrink:0}
.modal-search input{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:12px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;font-family:inherit}
.modal-search input::placeholder{color:var(--text3)}
.modal-list{overflow-y:auto;padding:8px 0}
.city-item{padding:13px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .15s;border-bottom:0.5px solid var(--border)}
.city-item:last-child{border:none}
.city-item:active{background:var(--surface2)}
.city-name{font-size:14px;font-weight:600;color:var(--text)}
.city-region{font-size:11px;color:var(--text3)}
.city-km{font-size:11px;color:var(--green);margin-left:auto;font-weight:600}

/* ── DATE PICKER ── */
.date-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:12px 16px}
.date-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;transition:background .15s}
.date-cell:hover{background:var(--surface2)}
.date-cell.sel{background:var(--green);color:white}
.date-cell.today{border:1.5px solid var(--green)}
.date-cell.past{opacity:.3;cursor:default}
.date-num{font-size:14px;font-weight:700}
.date-day{font-size:9px;font-weight:600;color:var(--text3);margin-bottom:2px}
.date-cell.sel .date-day{color:rgba(255,255,255,.7)}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 0;font-size:15px;font-weight:700;color:var(--text)}
.month-btn{font-size:22px;cursor:pointer;color:var(--green);padding:0 8px;user-select:none}

/* ── PASSENGERS ── */
.pax-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:0.5px solid var(--border)}
.pax-row:last-child{border:none}
.pax-info .name{font-size:14px;font-weight:600;color:var(--text)}
.pax-info .sub{font-size:11px;color:var(--text3)}
.pax-ctrl{display:flex;align-items:center;gap:14px}
.pax-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--green);background:transparent;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--green);user-select:none;transition:background .15s}
.pax-btn:active{background:var(--green-light)}
.pax-val{font-size:18px;font-weight:700;color:var(--text);min-width:24px;text-align:center}

/* ── RESULTS ── */
.filter-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.pill{padding:7px 14px;border-radius:20px;font-size:11px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text2);white-space:nowrap;cursor:pointer;font-weight:600;transition:all .2s}
.pill.active{background:var(--dark);color:white;border-color:var(--dark)}
.company-name{font-size:15px;font-weight:700;color:var(--text)}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700}
.badge-green{background:var(--green-light);color:var(--green-text)}
.badge-amber{background:var(--amber-light);color:var(--amber-text)}
.big-price{font-size:24px;font-weight:800;color:var(--green)}
.price-unit{font-size:11px;color:var(--text3)}
.route-row{display:flex;align-items:center;gap:8px;margin:10px 0 8px}
.big-time{font-size:20px;font-weight:800;color:var(--text)}
.city-lbl{font-size:10px;color:var(--text3)}
.dur{flex:1;text-align:center;font-size:10px;color:var(--text3)}
.tag-row{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:4px 10px;border-radius:20px;background:var(--surface2);color:var(--text2);font-weight:500}
.tag.green{background:var(--green-light);color:var(--green-text)}
.promo-banner{background:linear-gradient(135deg,var(--dark),#2d6a4f);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.promo-text{font-size:12px;color:rgba(255,255,255,.8);flex:1}
.promo-val{font-size:18px;font-weight:800;color:var(--amber)}

/* ── SEATS ── */
.seat-wrap{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.bus-front{text-align:center;font-size:11px;color:var(--text3);margin-bottom:12px;padding-bottom:10px;border-bottom:0.5px dashed var(--border)}
.seat-grid{display:grid;grid-template-columns:1fr 16px 1fr;gap:5px}
.seat-col{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.seat{aspect-ratio:1;border-radius:8px;border:0.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;user-select:none}
.seat:active{transform:scale(0.9)}
.seat.occ{background:var(--surface2);color:var(--text3);cursor:default;border-color:var(--border)}
.seat.sel{background:var(--green);color:white;border-color:var(--green)}
.seat.vip{border-color:var(--amber);color:var(--amber-text)}
.seat.vip:hover{background:var(--amber-light)}

/* ── PAX COUNTER ── */
.counter{display:flex;align-items:center;gap:14px;margin-top:10px}
.cnt-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--green);background:transparent;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;color:var(--green);user-select:none}
.cnt-btn:active{background:var(--green-light)}
.cnt-val{font-size:18px;font-weight:700;min-width:24px;text-align:center;color:var(--text)}

/* ── PAYMENT ── */
.pay-opt{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:border-color .2s}
.pay-opt.sel{border:2px solid var(--green)}
.pay-logo{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;flex-shrink:0}
.pay-logo.om{background:#FF6600}.pay-logo.mm{background:#009900}.pay-logo.wv{background:#0066FF}.pay-logo.cb{background:#993300}
.pay-name{font-size:13px;font-weight:700;color:var(--text)}
.pay-sub{font-size:10px;color:var(--text3)}
.radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;margin-left:auto;transition:border-color .2s}
.pay-opt.sel .radio{border-color:var(--green)}
.radio-dot{width:11px;height:11px;border-radius:50%;background:var(--green);display:none}
.pay-opt.sel .radio-dot{display:block}
.order-box{background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:14px;border:0.5px solid var(--border)}
.order-head{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.order-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:5px}
.order-total{display:flex;justify-content:space-between;font-size:16px;font-weight:800;color:var(--text);margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)}

/* ── OTP ── */
.otp-center{text-align:center;padding:20px 16px 16px}
.op-badge{display:inline-flex;align-items:center;gap:8px;background:var(--amber-light);border-radius:12px;padding:8px 16px;margin-bottom:14px}
.op-dot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white}
.otp-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:4px}
.otp-sub{font-size:12px;color:var(--text3);margin-bottom:12px}
.otp-phone{background:var(--surface2);border-radius:10px;padding:9px 14px;text-align:center;font-size:13px;color:var(--text2);margin-bottom:12px}
.otp-amount{background:var(--green-light);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;font-size:13px;margin-bottom:14px}
.otp-amount .lbl{color:var(--green-text);font-weight:600}
.otp-amount .val{font-weight:800;color:var(--green-text)}
.otp-boxes{display:flex;gap:10px;justify-content:center;margin-bottom:12px}
.otp-box{width:52px;height:58px;border:2px solid var(--border2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:var(--text);background:var(--surface);transition:border-color .2s}
.otp-box.filled{border-color:var(--green);background:var(--green-light)}
.otp-box.cur{border-color:var(--amber)}
.otp-resend{font-size:12px;color:var(--green);cursor:pointer;margin-bottom:14px;font-weight:600}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 10px}
.key{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:15px;text-align:center;font-size:20px;font-weight:700;cursor:pointer;color:var(--text);user-select:none;transition:background .1s}
.key:active{background:var(--surface2)}
.key.del{font-size:14px;color:var(--text3)}
.key.ok{background:var(--green);color:white;border-color:var(--green);font-size:14px}
.key.ok:active{background:var(--green-dark)}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:18px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TICKET ── */
.ticket{background:var(--surface);border-radius:var(--radius-lg);overflow:hidden;border:0.5px solid var(--border);margin-bottom:14px;box-shadow:var(--shadow)}
.ticket-top{background:var(--dark);padding:20px;text-align:center}
.ticket-brand{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:2px;font-weight:700;letter-spacing:.5px}
.ticket-route{font-size:24px;font-weight:800;color:white}
.ticket-meta{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}
.ticket-body{padding:18px}
.ticket-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:0.5px dashed var(--border)}
.tf-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:3px;font-weight:700}
.tf-val{font-size:15px;font-weight:800;color:var(--text)}
.qr-area{text-align:center;padding:12px 0}
.qr-hint-top{font-size:10px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.qr-frame{width:110px;height:110px;background:white;border:0.5px solid var(--border);border-radius:10px;display:inline-flex;align-items:center;justify-content:center;overflow:hidden;padding:4px}
.qr-code{font-size:11px;font-weight:800;color:var(--text);margin-top:8px;letter-spacing:1.5px}
.qr-hint{font-size:10px;color:var(--text3);margin-top:3px}

/* ── COLIS TRACKING ── */
.track-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.track-top{background:var(--dark);padding:16px}
.track-ref{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:3px;font-weight:600}
.track-route{font-size:16px;font-weight:800;color:white}
.track-badge{display:inline-block;background:var(--amber);color:#1a1a1a;font-size:10px;font-weight:800;padding:4px 12px;border-radius:20px;margin-top:8px}
.track-badge.done{background:var(--green);color:white}
.track-body{padding:14px}
.colis-meta{background:var(--surface2);border-radius:10px;padding:11px 13px;margin-bottom:14px}

  {company:'Élitiste',class:'VIP',price:5000,dep:'08:00',arr:'13:00',dur:'5h00',seats:5,tags:['USB','Repas','WiFi'],vip:true,morning:true},

];

var state={
  depart:'Ouagadougou', dest:'Bobo-Dioulasso',
  dateLabel:'19 mars', dateFull:'2026-03-19',
  adults:1, children:0, babies:0,
  selSeat:null, smallBags:0, largeBags:1,
  otpCode:[], payOp:{code:'OM',name:'Orange Money',color:'#FF6600'},
  selTrip:TRIPS[0], activeFilter:'all',
  calYear:2026, calMonth:2,
  dark:false
};

function injectAll(c){ var t=document.getElementById('tpl'); c.appendChild(document.importNode(t.content,true)); }
var D=document.getElementById('app-d'), M=document.getElementById('app-m');
injectAll(D); injectAll(M);

function app(){ return window.innerWidth<=600?M:D; }

window.go=function(id, instant){
  var a=app();
  var current=a.querySelector('.screen.active');
  var target=a.querySelector('#'+id);
  if(!target)return;

  function activate(){
    if(current&&current!==target){
      current.classList.remove('active');
    }
    target.classList.add('active');
    var sc=target.querySelector('.scroll');if(sc)sc.scrollTop=0;
    if(id==='s-seats'&&!state.selSeat)buildSeats();
    if(id==='s-otp')resetOtp();
    if(id==='s-dash')buildChart();
    if(id==='s-results')renderTrips();
    if(id==='s-payment')renderPayment();
    updateLinks(id);
  }

  if(instant||!current||!current.classList.contains('active')){
    activate();
  } else {
    current.classList.add('slide-back');
    setTimeout(function(){
      current.classList.remove('active','slide-back');
      activate();
    },220);
  }
};

function updateLinks(id){
  document.querySelectorAll('.nav-link').forEach(function(l){l.classList.remove('active');});
  var l=document.getElementById('lnk-'+id);
  if(l)l.classList.add('active');
}

window.setTab=function(idx,el){
  var s=el.closest('.screen');
  s.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',i===idx);});
  [0,1,2].forEach(function(i){var e=s.querySelector('#tab-'+i);if(e)e.style.display=i===idx?'block':'none';});
};

/* ── CITY MODAL ── */
var cityTarget='dest';
window.openModal=function(type){
  var a=app();
  if(type==='depart'||type==='dest'){
    cityTarget=type;
    a.querySelectorAll('.modal-overlay#modal-city').forEach(function(m){
      var ti=m.querySelector('#modal-city-title');
      if(ti)ti.textContent=type==='depart'?'Choisir ville de départ':'Choisir destination';
      var inp=m.querySelector('#city-search');
      if(inp){inp.value='';filterCities('');}
      m.classList.add('open');
    });
  } else if(type==='date'){
    a.querySelectorAll('.modal-overlay#modal-date').forEach(function(m){
      buildCal();
      m.classList.add('open');
    });
  } else if(type==='pax'){
    a.querySelectorAll('.modal-overlay#modal-pax').forEach(function(m){
      m.querySelectorAll('#pax-a').forEach(function(e){e.textContent=state.adults;});
      m.querySelectorAll('#pax-e').forEach(function(e){e.textContent=state.children;});
      m.querySelectorAll('#pax-b').forEach(function(e){e.textContent=state.babies;});
      m.classList.add('open');
    });
  }
};
window.closeModal=function(t){app().querySelectorAll('.modal-overlay#modal-'+t).forEach(function(m){m.classList.remove('open');});};

window.filterCities=function(v){
  var a=app();
  var filtered=v?CITIES.filter(function(c){return c.name.toLowerCase().includes(v.toLowerCase());}):CITIES;
  a.querySelectorAll('#city-list').forEach(function(list){
    list.innerHTML=filtered.map(function(c){
      return '<div class="city-item" onclick="pickCity(\''+c.name+'\')">'
        +'<div><div class="city-name">'+c.name+'</div><div class="city-region">'+c.region+'</div></div>'
        +'<div class="city-km">'+c.km+'</div></div>';
    }).join('');
  });
};
filterCities('');

window.pickCity=function(name){
  if(cityTarget==='dest'){
    state.dest=name;
    app().querySelectorAll('#fld-dest-txt').forEach(function(e){e.className='val';e.textContent=name;});
    app().querySelectorAll('#dest-lbl').forEach(function(e){e.textContent=name;});
  } else {
    state.depart=name;
    app().querySelectorAll('#fld-depart').forEach(function(e){e.textContent=name;});
  }
  closeModal('city');
};

window.swapCities=function(){
  var tmp=state.depart; state.depart=state.dest; state.dest=tmp;
  app().querySelectorAll('#fld-depart').forEach(function(e){e.textContent=state.depart;});
  app().querySelectorAll('#fld-dest-txt').forEach(function(e){
    if(state.dest===state.depart){e.className='ph';e.textContent='Choisir';}
    else{e.className='val';e.textContent=state.dest;}
  });
};

/* ── CALENDAR ── */
var MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
var DAYS=['Lu','Ma','Me','Je','Ve','Sa','Di'];
window.changeMonth=function(d){state.calMonth=(state.calMonth+d+12)%12;if(d>0&&state.calMonth===0)state.calYear++;if(d<0&&state.calMonth===11)state.calYear--;buildCal();};

function buildCal(){
  var a=app();
  a.querySelectorAll('#cal-month').forEach(function(e){e.textContent=MONTHS[state.calMonth]+' '+state.calYear;});
  var y=state.calYear,m=state.calMonth;
  var first=new Date(y,m,1).getDay(); first=(first+6)%7;
  var days=new Date(y,m+1,0).getDate();
  a.querySelectorAll('#cal-grid').forEach(function(grid){
    grid.innerHTML='';
    for(var i=0;i<first;i++){var e=document.createElement('div');e.className='date-cell past';grid.appendChild(e);}
    for(var d=1;d<=days;d++){
      var cell=document.createElement('div');cell.className='date-cell';
      var dn=document.createElement('div');dn.className='date-num';dn.textContent=d;
      cell.appendChild(dn);
      var lbl=state.dateLabel;
      if(lbl===d+' '+MONTHS[m].toLowerCase().slice(0,4))cell.classList.add('sel');
      (function(day){cell.onclick=function(){pickDate(y,m,day);};})(d);
      grid.appendChild(cell);
    }
  });
}

function pickDate(y,m,d){
  state.calYear=y;state.calMonth=m;
  var mName=MONTHS[m];
  state.dateLabel=d+' '+mName.toLowerCase().slice(0,4);
  state.dateFull=y+'-'+(m+1<10?'0'+(m+1):(m+1))+'-'+(d<10?'0'+d:d);
  app().querySelectorAll('#fld-date').forEach(function(e){e.textContent=state.dateLabel;});
  closeModal('date');
}

/* ── PASSENGERS ── */
window.changePax=function(t,d){
  if(t==='a')state.adults=Math.max(1,state.adults+d);
  else if(t==='e')state.children=Math.max(0,state.children+d);
  else state.babies=Math.max(0,state.babies+d);
  app().querySelectorAll('#pax-a').forEach(function(e){e.textContent=state.adults;});
  app().querySelectorAll('#pax-e').forEach(function(e){e.textContent=state.children;});
  app().querySelectorAll('#pax-b').forEach(function(e){e.textContent=state.babies;});
};
window.confirmPax=function(){
  var total=state.adults+state.children;
  var lbl=state.adults+' adulte'+(state.adults>1?'s':'');
  if(state.children)lbl+=', '+state.children+' enfant'+(state.children>1?'s':'');
  if(state.babies)lbl+=', '+state.babies+' bébé'+(state.babies>1?'s':'');
  app().querySelectorAll('#fld-pax').forEach(function(e){e.textContent=lbl;});
  app().querySelectorAll('#r-pax').forEach(function(e){e.textContent=total+' passager'+(total>1?'s':'');});
  closeModal('pax');
};

/* ── SEARCH ── */
window.doSearch=function(){
  if(!state.dest||state.dest===state.depart){openModal('dest');return;}
  go('s-results');
};

/* ── RESULTS ── */
window.filterResults=function(f,el){
  state.activeFilter=f;
  app().querySelectorAll('.pill').forEach(function(p){p.classList.remove('active');});
  el.classList.add('active');
  renderTrips();
};

function renderTrips(){
  var a=app();
  var f=state.activeFilter;
  var list=TRIPS.filter(function(t){
    if(f==='morning')return t.morning;
    if(f==='afternoon')return !t.morning;
    if(f==='vip')return t.vip;
    if(f==='clim')return t.tags.indexOf('Climatisé')>-1;
    if(f==='cheap')return t.price<=3200;
    return true;
  });
  if(f==='cheap')list.sort(function(a,b){return a.price-b.price;});
  a.querySelectorAll('#results-list').forEach(function(rl){
    if(!list.length){rl.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">Aucun résultat pour ce filtre</div>';return;}
    rl.innerHTML=list.map(function(t,i){
      var isFirst=i===0&&f==='all';
      return '<div class="card tappable'+(isFirst?' featured':'')+'" onclick="pickTrip('+i+')">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
        +'<div><div class="company-name">'+t.company+'</div><span class="badge '+(t.vip?'badge-amber':'badge-green')+'">'+t.class+'</span></div>'
        +'<div style="text-align:right"><div class="big-price">'+t.price.toLocaleString()+'</div><div class="price-unit">FCFA / pers.</div></div></div>'
        +'<div class="route-row"><div><div class="big-time">'+t.dep+'</div><div class="city-lbl">'+state.depart+'</div></div>'
        +'<div class="dur">🚌<br>'+t.dur+'</div>'
        +'<div style="text-align:right"><div class="big-time">'+t.arr+'</div><div class="city-lbl">'+state.dest+'</div></div></div>'
        +'<div class="tag-row"><span class="tag">'+t.seats+' places</span>'
        +t.tags.map(function(tg){return '<span class="tag green">'+tg+'</span>';}).join('')+'</div></div>';
    }).join('');
  });
}

window.pickTrip=function(i){
  state.selTrip=TRIPS[i]||TRIPS[0];
  app().querySelectorAll('#seat-trip-label').forEach(function(e){e.textContent=state.selTrip.company+' · '+state.depart.slice(0,5)+' → '+state.dest.slice(0,4);});
  app().querySelectorAll('#seat-price').forEach(function(e){e.textContent=state.selTrip.price.toLocaleString()+' FCFA';});
  go('s-seats');
};

/* ── SEATS ── */
var occupied=[3,5,8,13,18,23,28,33,38,43],vipS=[1,4];
function buildSeats(){
  var a=app();
  var lc=a.querySelector('#col-l'),rc=a.querySelector('#col-r');
  if(!lc||!rc)return;
  lc.innerHTML='';rc.innerHTML='';
  for(var i=1;i<=44;i++){
    var s=document.createElement('div');s.className='seat';s.textContent=i;
    if(occupied.indexOf(i)>-1)s.classList.add('occ');
    else if(i===state.selSeat)s.classList.add('sel');
    else if(vipS.indexOf(i)>-1)s.classList.add('vip');
    if(occupied.indexOf(i)===-1)(function(n){s.onclick=function(){pickSeat(n);};})(i);
    ((i-1)%4<2?lc:rc).appendChild(s);
  }
}
function pickSeat(n){
  state.selSeat=n;buildSeats();
  var a=app();
  var btn=a.querySelector('#seat-btn');if(btn){btn.style.opacity='1';btn.style.pointerEvents='auto';}
  var hint=a.querySelector('#seat-hint');if(hint)hint.style.display='none';
  a.querySelectorAll('#pay-seat').forEach(function(e){e.textContent=n;});
  a.querySelectorAll('#tk-seat').forEach(function(e){e.textContent=n;});
}

/* ── BAGGAGE ── */
window.chgBag=function(t,d){
  if(t==='s')state.smallBags=Math.max(0,state.smallBags+d);
  else state.largeBags=Math.max(0,state.largeBags+d);
  app().querySelectorAll('#cnt-s').forEach(function(e){e.textContent=state.smallBags;});
  app().querySelectorAll('#cnt-l').forEach(function(e){e.textContent=state.largeBags;});
  updateBagRecap();updatePayTotal();
};
function updateBagRecap(){
  var a=app(),h='';
  if(state.smallBags)h+='<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px"><span>Petit bagage ×'+state.smallBags+'</span><span>'+(state.smallBags*1000).toLocaleString()+' FCFA</span></div>';
  if(state.largeBags)h+='<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px"><span>Grand bagage ×'+state.largeBags+'</span><span>'+(state.largeBags*2500).toLocaleString()+' FCFA</span></div>';
  if(!h)h='<div style="font-size:12px;color:var(--text3);font-style:italic">Aucun bagage supplémentaire</div>';
  a.querySelectorAll('#bag-recap').forEach(function(e){e.innerHTML=h;});
}
function total(){return state.selTrip.price*state.adults+state.smallBags*1000+state.largeBags*2500+150;}
function updatePayTotal(){
  var t=total();
  app().querySelectorAll('#pay-total,#pay-btn-amt,#otp-amt').forEach(function(e){e.textContent=t.toLocaleString()+' FCFA';});
}
function renderPayment(){
  var a=app();
  var t=state.selTrip;
  var billetAmt=t.price*state.adults;
  a.querySelectorAll('#pay-billet-amt').forEach(function(e){e.textContent=billetAmt.toLocaleString()+' FCFA';});
  a.querySelectorAll('#pay-pax-n').forEach(function(e){e.textContent=state.adults;});
  a.querySelectorAll('#pay-date').forEach(function(e){e.textContent=state.dateLabel;});
  var h='';
  if(state.smallBags)h+='<div class="order-row"><span>Petit bagage ×'+state.smallBags+'</span><span>'+(state.smallBags*1000).toLocaleString()+' FCFA</span></div>';
  if(state.largeBags)h+='<div class="order-row"><span>Grand bagage ×'+state.largeBags+'</span><span>'+(state.largeBags*2500).toLocaleString()+' FCFA</span></div>';
  a.querySelectorAll('#pay-bags-rows').forEach(function(e){e.innerHTML=h;});
  updatePayTotal();
}

/* ── PAYMENT ── */
window.selPay=function(el,code,name,color){
  el.closest('.scroll').querySelectorAll('.pay-opt').forEach(function(p){p.classList.remove('sel');});
  el.classList.add('sel');
  state.payOp={code:code,name:name,color:color};
};

/* ── OTP ── */
function resetOtp(){
  state.otpCode=[];
  var a=app();
  a.querySelectorAll('#op-dot').forEach(function(e){e.textContent=state.payOp.code;e.style.background=state.payOp.color;});
  a.querySelectorAll('#op-name').forEach(function(e){e.textContent=state.payOp.name;});
  a.querySelectorAll('#proc-op').forEach(function(e){e.textContent=state.payOp.name;});
  for(var i=0;i<4;i++){a.querySelectorAll('#ob'+i).forEach(function(e){e.textContent='';e.className='otp-box'+(i===0?' cur':'');});}
  a.querySelectorAll('#otp-form').forEach(function(e){e.style.display='flex';});
  a.querySelectorAll('#otp-proc').forEach(function(e){e.style.display='none';});
  updatePayTotal();
}
function renderOtp(){
  var a=app();
  for(var i=0;i<4;i++){
    a.querySelectorAll('#ob'+i).forEach(function(e){
      e.className='otp-box';
      if(i<state.otpCode.length){e.textContent='•';e.classList.add('filled');}
      else{e.textContent='';if(i===state.otpCode.length)e.classList.add('cur');}
    });
  }
}
window.kp=function(k){
  if(k==='del'){if(state.otpCode.length){state.otpCode.pop();renderOtp();}return;}
  if(state.otpCode.length>=4)return;
  state.otpCode.push(k);renderOtp();
  if(state.otpCode.length===4)setTimeout(kpOk,300);
};
window.kpOk=function(){
  if(!state.otpCode.length)return;
  var a=app();
  a.querySelectorAll('#otp-form').forEach(function(e){e.style.display='none';});
  a.querySelectorAll('#otp-proc').forEach(function(e){e.style.display='flex';});
  setTimeout(function(){
    go('s-success');
    setTimeout(function(){showPush('✅','Paiement confirmé !','Billet MB-2026-00847 émis');},800);
  },2200);
};

/* ── COLIS ── */
window.simArrive=function(){
  var a=app();
  a.querySelectorAll('#tl3').forEach(function(e){e.className='tl-dot done';e.textContent='✓';});
  a.querySelectorAll('#tl3t').forEach(function(e){e.textContent='En transit ✓';});

/* ── DASHBOARD ── */
window.dTab=function(t,el){
  var a=app();
  a.querySelectorAll('.seg-tab').forEach(function(x){x.classList.remove('active');});
  el.classList.add('active');
  ['d-o','d-v','d-c'].forEach(function(id){a.querySelectorAll('#'+id).forEach(function(e){e.style.display='none';});});
  a.querySelectorAll('#d-'+t).forEach(function(e){e.style.display='block';});
};
function buildChart(){
  var a=app();
  a.querySelectorAll('#bchart').forEach(function(bc){
    if(bc.children.length)return;
    var days=['Jeu','Ven','Sam','Dim','Lun','Mar','Mer'],vals=[58,72,95,61,83,76,100];
    days.forEach(function(d,i){
      var w=document.createElement('div');w.className='bw';
      var b=document.createElement('div');b.className='b'+(i===6?' today':'');b.style.height=Math.round(vals[i]*.66)+'px';
      var l=document.createElement('div');l.className='b-day';l.textContent=d;
      w.appendChild(b);w.appendChild(l);bc.appendChild(w);
    });
  });
}

/* ── PUSH NOTIFICATION ── */
var pushTimer=null;
window.showPush=function(icon,title,sub){
  var a=app();
  a.querySelectorAll('#push-notif').forEach(function(p){
    p.querySelector('#push-icon').textContent=icon;
    p.querySelector('#push-title').textContent=title;
    p.querySelector('#push-sub').textContent=sub;
    p.classList.add('show');
    if(pushTimer)clearTimeout(pushTimer);
    pushTimer=setTimeout(function(){p.classList.remove('show');},4000);
    p.onclick=function(){p.classList.remove('show');};
  });
};

/* ── DARK MODE ── */
window.toggleDark=function(){
  state.dark=!state.dark;
  document.documentElement.setAttribute('data-theme',state.dark?'dark':'light');
  var trk=document.getElementById('toggle-track');
  if(trk)trk.classList.toggle('on',state.dark);
  document.querySelectorAll('.toggle-track').forEach(function(t){t.classList.toggle('on',state.dark);});
};

/* ── INIT ── */
[D,M].forEach(function(c){c.querySelectorAll('.screen.active').forEach(function(s){s.classList.remove('active');});});
go('s-home',true);
updateBagRecap();
renderTrips();
buildChart();
window.addEventListener('resize',function(){if(!app().querySelector('.screen.active'))go('s-home',true);});

})();
</script>
